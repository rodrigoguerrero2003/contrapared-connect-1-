<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Contrapared Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--blue:#2B4590;--blue-dark:#1e3270;--blue-light:#3d5ab5;--lime:#C8D62B;--lime-dark:#a8b520;--black:#1A1A1A;--white:#ffffff;--gray-100:#f4f5f7;--gray-200:#e8eaee;--gray-300:#d1d5de;--gray-500:#8a90a0;--gray-700:#4a5068;--gray-900:#1e2030;--kids:#2B4590;--kids-light:#eef1fa;--hp-light:#f7f9d6;--academia-light:#f0f0f0;--radius:10px;--radius-lg:16px;--shadow-sm:0 2px 8px rgba(43,69,144,.10);--shadow:0 4px 20px rgba(43,69,144,.14);--shadow-lg:0 8px 40px rgba(43,69,144,.18);--sidebar-w:260px;--topbar-h:62px;--mobile-nav-h:68px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--gray-100);color:var(--black);font-size:15px;line-height:1.5}
button,input,select,textarea{font:inherit;border:0;outline:0}
img{display:block;max-width:100%}
#app{min-height:100vh}
.app-shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.main-area{display:flex;flex-direction:column;min-width:0;background:var(--gray-100)}
.view{flex:1;padding:24px;overflow-y:auto}
.sidebar{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;background:var(--blue-dark);color:var(--white);overflow-y:auto;z-index:30}
.sidebar-brand{display:flex;align-items:center;gap:12px;padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.brand-logo{width:40px;height:40px;background:var(--lime);border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.brand-logo svg{width:26px;height:26px}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:900;line-height:1.1}
.brand-sub{font-size:.7rem;opacity:.6;font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.sidebar-profile{margin:14px 12px;padding:12px;background:rgba(255,255,255,.08);border-radius:var(--radius);border:1px solid rgba(255,255,255,.1)}
.profile-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.6;margin-bottom:4px}
.profile-name{font-weight:700;font-size:.88rem}
.profile-role{font-size:.75rem;opacity:.7;margin-top:1px}
.side-nav{flex:1;padding:8px 12px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;min-height:42px;padding:8px 12px;border-radius:var(--radius);color:rgba(255,255,255,.75);background:transparent;cursor:pointer;transition:all .15s;font-size:.88rem;font-weight:600}
.nav-item:hover{background:rgba(255,255,255,.1);color:var(--white)}
.nav-item.active{background:var(--blue);color:var(--white)}
.nav-icon{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.12);font-size:.8rem;flex-shrink:0}
.nav-item.active .nav-icon{background:var(--lime);color:var(--blue-dark)}
.nav-badge{margin-left:auto;min-width:20px;height:20px;padding:0 6px;background:var(--lime);color:var(--blue-dark);border-radius:10px;font-size:.65rem;font-weight:800;display:grid;place-items:center}
.sidebar-footer{padding:14px;border-top:1px solid rgba(255,255,255,.08)}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;min-height:var(--topbar-h);padding:0 24px;background:var(--white);border-bottom:1px solid var(--gray-200);box-shadow:var(--shadow-sm)}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;flex:1}
.topbar-date{font-size:.8rem;color:var(--gray-500);font-weight:500}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap input{width:100%;height:38px;padding:0 12px 0 36px;border:1.5px solid var(--gray-200);border-radius:20px;font-size:.85rem;background:var(--gray-100);transition:all .15s}
.search-wrap input:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(43,69,144,.1)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-500);font-size:16px}
.menu-btn{display:none;width:38px;height:38px;border-radius:var(--radius);background:var(--gray-100);cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.menu-btn span{width:18px;height:2px;background:var(--black);border-radius:2px;display:block}
.notif-btn{position:relative;width:38px;height:38px;background:var(--gray-100);border-radius:var(--radius);display:grid;place-items:center;cursor:pointer;font-size:18px;border:1.5px solid var(--gray-200)}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;height:var(--mobile-nav-h);background:var(--blue-dark);padding:8px 8px 12px;gap:4px;border-top:1px solid rgba(255,255,255,.08)}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 4px;border-radius:10px;color:rgba(255,255,255,.6);cursor:pointer;font-size:.62rem;font-weight:700;text-transform:uppercase;background:transparent;transition:all .15s;position:relative}
.mobile-nav-item.active{color:var(--lime)}
.mobile-nav-item .mn-icon{font-size:20px;line-height:1}
.mobile-nav-badge{position:absolute;top:4px;right:calc(50% - 16px);min-width:16px;height:16px;padding:0 4px;background:var(--lime);color:var(--blue-dark);border-radius:8px;font-size:.58rem;font-weight:800;display:grid;place-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;min-height:38px;border-radius:var(--radius);font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s;white-space:nowrap;border:1.5px solid transparent}
.btn-primary{background:var(--blue);color:var(--white)}.btn-primary:hover{background:var(--blue-dark)}
.btn-lime{background:var(--lime);color:var(--blue-dark)}.btn-lime:hover{background:var(--lime-dark)}
.btn-ghost{background:var(--white);color:var(--black);border-color:var(--gray-200)}.btn-ghost:hover{background:var(--gray-100)}
.btn-danger{background:#e53e3e;color:var(--white)}
.btn-sm{padding:5px 10px;min-height:30px;font-size:.78rem}
.btn-full{width:100%}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.card-title{font-size:1rem;font-weight:700}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:4px}
.section-sub{font-size:.85rem;color:var(--gray-500);margin-bottom:16px}
.tag{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:11px;font-size:.7rem;font-weight:700;white-space:nowrap}
.tag-kids{background:var(--kids-light);color:var(--kids)}
.tag-hp{background:var(--hp-light);color:#5a6010}
.tag-academia{background:var(--academia-light);color:var(--black)}
.tag-green{background:#d1fae5;color:#065f46}
.tag-red{background:#fee2e2;color:#991b1b}
.tag-amber{background:#fef3c7;color:#92400e}
.tag-blue{background:var(--kids-light);color:var(--kids)}
.tag-gray{background:var(--gray-200);color:var(--gray-700)}
.kpi-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:16px;border-left:4px solid var(--blue)}
.kpi-card.lime{border-left-color:var(--lime)}.kpi-card.red{border-left-color:#e53e3e}.kpi-card.black{border-left-color:var(--black)}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;line-height:1}
.kpi-label{font-size:.8rem;color:var(--gray-500);font-weight:600;margin-top:3px}
.student-list{display:grid;gap:10px}
.student-card{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;padding:14px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s}
.student-card:hover{border-color:var(--blue);box-shadow:var(--shadow-sm)}
.avatar{width:46px;height:46px;flex-shrink:0;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:.95rem;color:var(--white)}
.avatar-blue{background:var(--blue)}.avatar-lime{background:#5a6010}.avatar-black{background:var(--black)}
.student-name{font-weight:700;font-size:.92rem;margin-bottom:3px}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:.78rem;color:var(--gray-500)}
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.cat-tab{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--radius);border:2px solid var(--gray-200);background:var(--white);cursor:pointer;font-weight:700;font-size:.88rem;transition:all .18s}
.cat-tab .cat-dot{width:10px;height:10px;border-radius:50%}
.cat-tab:hover{border-color:var(--blue)}
.cat-tab.ak-kids{border-color:var(--kids);background:var(--kids-light);color:var(--kids)}
.cat-tab.ak-hp{border-color:var(--lime-dark);background:var(--hp-light);color:#4a5010}
.cat-tab.ak-academia{border-color:var(--black);background:var(--academia-light);color:var(--black)}
.cat-tab.ak-all{border-color:var(--blue);background:var(--kids-light);color:var(--blue)}
.progress-row{display:grid;grid-template-columns:110px 1fr 40px;align-items:center;gap:10px;font-size:.82rem}
.progress-bar{height:8px;background:var(--gray-200);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue-light));border-radius:4px}
.att-grid{display:grid;gap:10px}
.att-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:12px 14px;background:var(--gray-100);border-radius:var(--radius)}
.att-btn{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:20px;cursor:pointer;transition:all .15s;border:2px solid var(--gray-300);background:var(--white)}
.att-btn.check{border-color:#22c55e;background:#d1fae5;color:#15803d}
.att-btn.cross{border-color:#ef4444;background:#fee2e2;color:#b91c1c}
.chat-layout{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
.conv-list{display:grid;gap:8px}
.conv-card{padding:12px 14px;background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.conv-card:hover{border-color:var(--blue)}
.conv-card.active{border-color:var(--blue);border-left:4px solid var(--blue);background:var(--kids-light)}
.conv-title{font-weight:700;font-size:.88rem;margin-bottom:2px}
.conv-sub{font-size:.76rem;color:var(--gray-500)}
.chat-panel{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);overflow:hidden}
.chat-head{padding:14px 16px;background:var(--blue-dark);color:var(--white)}
.chat-head-title{font-weight:700;font-size:.95rem}
.chat-head-sub{font-size:.78rem;opacity:.7;margin-top:2px}
.chat-messages{padding:16px;display:grid;gap:10px;min-height:260px;max-height:360px;overflow-y:auto;align-content:start}
.bubble{max-width:72%;padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.5}
.bubble-theirs{background:var(--gray-100);color:var(--black);border-radius:14px 14px 14px 4px}
.bubble-mine{background:var(--blue);color:var(--white);margin-left:auto;border-radius:14px 14px 4px 14px}
.bubble-time{font-size:.68rem;margin-top:4px;opacity:.7}
.chat-compose{display:flex;gap:8px;padding:12px;border-top:1px solid var(--gray-200);background:var(--gray-100)}
.chat-compose input{flex:1;height:40px;padding:0 14px;border:1.5px solid var(--gray-200);border-radius:20px;background:var(--white);font-size:.88rem}
.chat-compose input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,69,144,.1)}
.cal-layout{display:grid;grid-template-columns:1fr 300px;gap:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-weekday{text-align:center;font-size:.7rem;font-weight:800;color:var(--gray-500);padding:6px 2px;text-transform:uppercase}
.cal-day{min-height:72px;padding:6px;background:var(--white);border:1px solid var(--gray-200);border-radius:8px;cursor:pointer;transition:all .12s;text-align:left;display:grid;align-content:start;gap:2px}
.cal-day:hover,.cal-day.sel{border-color:var(--blue);box-shadow:0 0 0 2px rgba(43,69,144,.12)}
.cal-day.sel{background:var(--kids-light)}
.cal-day.today .cal-day-num{display:inline-grid;place-items:center;width:24px;height:24px;background:var(--blue);color:var(--white);border-radius:50%}
.cal-day.muted{opacity:.4}
.cal-day-num{font-size:.78rem;font-weight:700}
.cal-event{font-size:.62rem;font-weight:700;padding:2px 4px;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-event-kids{background:var(--kids-light);color:var(--kids)}
.cal-event-hp{background:var(--hp-light);color:#5a6010}
.cal-event-academia{background:var(--academia-light);color:var(--black)}
#modal-root{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(26,26,26,.5);backdrop-filter:blur(4px)}
#modal-root.open{display:flex}
.modal{width:min(640px,100%);max-height:90vh;background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden;display:flex;flex-direction:column}
.modal-wide{max-width:760px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--gray-200);flex-shrink:0}
.modal-title{font-weight:800;font-size:1.05rem}
.modal-close{width:32px;height:32px;border-radius:8px;background:var(--gray-100);cursor:pointer;display:grid;place-items:center;font-size:18px;color:var(--gray-700)}
.modal-body{padding:20px;overflow-y:auto}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.8rem;font-weight:700;color:var(--gray-700);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 13px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:.9rem;background:var(--white);color:var(--black);transition:border .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,69,144,.1)}
.form-textarea{min-height:80px;resize:vertical}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.auth-screen{min-height:100vh;background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 60%,#1e3060 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{width:min(900px,100%);background:var(--white);border-radius:24px;overflow:hidden;box-shadow:var(--shadow-lg);display:grid;grid-template-columns:1fr 1fr;min-height:580px}
.auth-hero{background:var(--blue-dark);padding:40px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden}
.auth-hero::before{content:'';position:absolute;inset:0;background:url('https://contrapared.mx/wp-content/themes/contrapared/assets/img/KIDS.jpg') center/cover;opacity:.2}
.auth-hero-content{position:relative;z-index:1;color:var(--white)}
.auth-logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:auto;padding-bottom:40px}
.auth-logo-box{width:52px;height:52px;background:var(--lime);border-radius:14px;display:grid;place-items:center}
.auth-logo-box svg{width:34px;height:34px}
.auth-brand{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:var(--white)}
.auth-brand small{display:block;font-size:.75rem;opacity:.7;font-weight:500;letter-spacing:.06em;font-family:'Barlow',sans-serif}
.auth-hero h1{font-family:'Barlow Condensed',sans-serif;font-size:2.6rem;font-weight:900;line-height:1;margin-bottom:8px}
.auth-hero p{font-size:.92rem;opacity:.8;line-height:1.5}
.auth-panel{padding:40px;overflow-y:auto;display:flex;flex-direction:column;justify-content:center}
.auth-divider{display:flex;align-items:center;gap:10px;color:var(--gray-400);font-size:.8rem;margin:16px 0}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.legal-box{background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;max-height:240px;overflow-y:auto;font-size:.85rem;line-height:1.7;color:var(--gray-700);margin-bottom:14px}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;cursor:pointer}
.checkbox-row input{width:18px;height:18px;margin-top:2px;accent-color:var(--blue);flex-shrink:0}
.period-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #fbbf24}
.period-badge.urgent{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.alert-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius);margin-bottom:12px;font-size:.88rem;border:1px solid}
.nps-scale{display:flex;gap:6px;flex-wrap:wrap}
.nps-btn{width:40px;height:40px;border-radius:8px;border:2px solid var(--gray-200);background:var(--white);font-weight:700;font-size:.88rem;cursor:pointer;transition:all .12s}
.nps-btn.selected{border-color:var(--blue);background:var(--blue);color:var(--white)}
.star-row{display:flex;gap:8px}
.star-btn{font-size:28px;cursor:pointer;opacity:.3;transition:.12s}
.star-btn.on{opacity:1}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.muted{color:var(--gray-500);font-size:.82rem}
.fw-700{font-weight:700}.fw-800{font-weight:800}
.text-sm{font-size:.82rem}
.divider{height:1px;background:var(--gray-200);margin:16px 0}
.empty-state{padding:48px 24px;text-align:center;color:var(--gray-500);background:var(--gray-100);border-radius:var(--radius-lg);border:2px dashed var(--gray-300)}
.empty-state-icon{font-size:2.5rem;margin-bottom:12px}
.empty-state h3{font-size:1rem;font-weight:700;color:var(--gray-700);margin-bottom:6px}
.empty-state p{font-size:.85rem;line-height:1.5;max-width:32ch;margin:0 auto 16px}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:grid;gap:8px;pointer-events:none}
.toast{padding:12px 18px;background:var(--gray-900);color:var(--white);border-radius:var(--radius);font-size:.88rem;font-weight:600;box-shadow:var(--shadow);animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){
  .app-shell{grid-template-columns:1fr}
  .sidebar{display:none;position:fixed;width:280px;height:100vh;left:0;top:0}
  .sidebar.open{display:flex;z-index:50;box-shadow:var(--shadow-lg)}
  .menu-btn{display:flex}
  .mobile-nav{display:flex}
  .view{padding:16px;padding-bottom:calc(var(--mobile-nav-h) + 16px)}
  .topbar{padding:0 16px}
  .search-wrap{display:none}
  .chat-layout{grid-template-columns:1fr}
  .cal-layout{grid-template-columns:1fr}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr}
  .auth-card{grid-template-columns:1fr}
  .auth-hero{display:none}
  .form-grid-2{grid-template-columns:1fr}
}
@media(max-width:520px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .cal-grid{gap:2px}
  .cal-day{min-height:54px;padding:4px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div class="toast-wrap" id="toasts"></div>
<script>
// ─── LOGO ───────────────────────────────────────────────────────────────────
const LOGO=`<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="44" stroke="#2B4590" stroke-width="12"/><circle cx="50" cy="50" r="14" fill="#C8D62B"/></svg>`;

// ─── CATEGORIES ─────────────────────────────────────────────────────────────
const CATS={
  kids:    {label:'KIDS',           color:'var(--kids)',  light:'var(--kids-light)',    courts:['7','8'],    maxPerClass:6, schedules:['16:00-17:00','17:00-18:00']},
  hp:      {label:'HIGH PERFORMANCE',color:'#5a6010',    light:'var(--hp-light)',      courts:['1','2','3','4','5','6'], maxPerClass:4, schedules:['16:00-18:00','18:00-20:00']},

// ─── UTILS ───────────────────────────────────────────────────────────────────
function toIso(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayIso(){return toIso(new Date())}
function h(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fullName(s){return[s.firstName,s.paternal,s.maternal].filter(Boolean).join(' ')}
function initials(s){return[s.firstName,s.paternal].filter(Boolean).map(p=>p[0].toUpperCase()).join('')}
function getAge(dob){const b=new Date(dob+'T00:00:00'),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t.getMonth()-b.getMonth()<0||(t.getMonth()-b.getMonth()===0&&t.getDate()<b.getDate()))a--;return a}
function formatDate(v){if(!v)return'';return new Intl.DateTimeFormat('es-MX',{day:'numeric',month:'short',year:'numeric'}).format(new Date(v+'T00:00:00'))}
function formatShort(v){if(!v)return'';return new Intl.DateTimeFormat('es-MX',{day:'numeric',month:'short'}).format(new Date(v+'T00:00:00'))}
function formatMonth(m){const s=new Intl.DateTimeFormat('es-MX',{month:'long',year:'numeric'}).format(new Date(m+'-01T00:00:00'));return s[0].toUpperCase()+s.slice(1)}
function formatMoney(v){return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(v||0)}
function daysUntil(ds){const d=new Date(ds+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/(864e5))}
function getStudent(id){return ST.data.students.find(s=>s.id===id)}
function getTeacher(id){return ST.data.teachers.find(t=>t.id===id)||{name:'Sin asignar'}}
function getActiveProfile(role=ST.role){const id=ST.data.activeProfileIds?.[role];return ST.data.profiles?.[role]?.find(p=>p.id===id)||null}
function avgProgress(s){const v=Object.values(s.progress||{});return v.length?Math.round(v.reduce((a,b)=>a+Number(b),0)/v.length):0}
function attRate(s){if(!s.attendance?.length)return 100;const ok=s.attendance.filter(a=>a.status==='ok').length;return Math.round(ok/s.attendance.length*100)}
function catTag(cat){const m={kids:'tag-kids',hp:'tag-hp',academia:'tag-academia'};return`<span class="tag ${m[cat]||'tag-gray'}">${h(CATS[cat]?.label||cat)}</span>`}
function avatarColor(cat){return cat==='kids'?'avatar-blue':cat==='hp'?'avatar-lime':'avatar-black'}
function getNearBirthdays(){return ST.data.students.filter(s=>{const b=new Date(s.dob+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);const nb=new Date(t.getFullYear(),b.getMonth(),b.getDate());if(nb<t)nb.setFullYear(t.getFullYear()+1);return Math.round((nb-t)/864e5)<=14})}
function getVisibleStudents(){
  if(ST.role==='family'){const p=getActiveProfile('family');const ids=new Set(p?.linkedStudents||[]);return ids.size?ST.data.students.filter(s=>ids.has(s.id)):[]}
  if(ST.role==='teacher'){const p=getActiveProfile('teacher');const t=ST.data.teachers.find(tc=>tc.id===p?.teacherId);if(!t)return[];return ST.data.students.filter(s=>t.cats?.includes(s.cat))}
  return ST.data.students;
}
function getVisibleLessons(){const ids=new Set(getVisibleStudents().map(s=>s.id));return ST.data.lessons.filter(l=>l.students?.some(id=>ids.has(id)))}
function getVisibleConversations(){
  if(ST.role==='director')return ST.data.conversations;
  return ST.data.conversations.filter(c=>c.roles?.includes(ST.role));
}
function can(p){
  const P={
    family:  {createStudent:0,editStudent:0,createLesson:0,takeAttendance:0,recordProgress:0,createAnnouncement:0,manageAnnouncement:0,manageConversation:0,viewFinancials:0},
    teacher: {createStudent:0,editStudent:0,createLesson:0,takeAttendance:1,recordProgress:1,createAnnouncement:1,manageAnnouncement:0,manageConversation:0,viewFinancials:0},
    admin:   {createStudent:1,editStudent:1,createLesson:1,takeAttendance:0,recordProgress:0,createAnnouncement:1,manageAnnouncement:1,manageConversation:1,viewFinancials:0},
    director:{createStudent:0,editStudent:0,createLesson:0,takeAttendance:0,recordProgress:0,createAnnouncement:0,manageAnnouncement:0,manageConversation:0,viewFinancials:1},
  };
  return!!(P[ST.role]?.[p]);
}

function getNavItems(){
  const base=[
    {id:'home',    label:'Inicio',  short:'Inicio', icon:'🏠',emoji:'🏠'},
    {id:'students',label:'Alumnos', short:'Alumnos',icon:'👥',emoji:'👥'},
    {id:'calendar',label:'Clases',  short:'Clases', icon:'📅',emoji:'📅'},
    {id:'messages',label:'Mensajes',short:'Msgs',   icon:'💬',emoji:'💬'},
    {id:'manage',  label:{family:'Mi perfil',teacher:'Mi grupo',admin:'Operación',director:'Dirección'}[ST.role],short:'Más',icon:'⚙️',emoji:'⚙️'},
  ];
  if(ST.role==='admin'||ST.role==='director'){
    base.splice(4,0,{id:'pagos',label:'Pagos',short:'Pagos',icon:'💳',emoji:'💳'});
  }
  return base;
}
function navCount(id){
  if(id==='students')return getVisibleStudents().length||0;
  if(id==='messages')return getVisibleConversations().reduce((s,c)=>s+(c.unread?.[ST.role]||0),0);
  if(id==='calendar')return getVisibleLessons().filter(l=>l.date>=todayIso()).length||0;
  if(id==='pagos'){
    const all=ST.data.students.flatMap(s=>s.payments||[]);
    return all.filter(p=>p.status==='Comprobante en revisión').length||0;
  }
  return 0;
}
function viewTitle(){
  const m={home:'Inicio',students:'Alumnos',studentDetail:'Perfil del alumno',calendar:'Clases',messages:'Mensajes',pagos:'Pagos',manage:{family:'Mi perfil',teacher:'Mi grupo',admin:'Operación',director:'Dirección'}[ST.role]};
  return m[ST.view]||'';
}
function renderView(){
  if(ST.view==='home')return renderHome();
  if(ST.view==='students')return renderStudents();
  if(ST.view==='studentDetail')return renderStudentDetail();
  if(ST.view==='calendar')return renderCalendar();
  if(ST.view==='messages')return renderMessages();
  if(ST.view==='pagos')return renderPagos();
  if(ST.view==='manage')return renderManage();
  return '';
}
function renderViewOnly(){const v=document.getElementById('view');if(v)v.innerHTML=renderView()}
function navigate(id){ST.view=id;ST.search='';render()}
function switchRole(r){ST.role=r;const convs=getVisibleConversations();ST.selectedConversationId=convs[0]?.id||null;saveSession();render()}

function doLogin(){
  const email=(document.getElementById('li-email')?.value||'').trim();
  const pass=document.getElementById('li-pass')?.value||'';
  if(!email||!pass){setErr('li-err','Ingresa tu correo y contraseña');return}
  const user=getUserByEmail(email);
  if(!user){setErr('li-err','No encontramos una cuenta con ese correo');return}
  if(user.password!==btoa(pass)){setErr('li-err','Contraseña incorrecta');return}
  loginAs(user);
}

function loginAs(user){
  ST.data.activeProfileIds[user.role]=user.profileId;
  ST.auth=true; ST.role=user.role; ST.view='home';
  ST.currentUserId=user.id;
  ST.selectedDate=todayIso(); ST.calendarMonth=todayIso().slice(0,7);
  // Set default conversation
  const convs=getVisibleConversations();
  ST.selectedConversationId=convs[0]?.id||null;
  save(); saveSession(); render();
  toast(`¡Bienvenido/a, ${user.name.split(' ')[0]}! 👋`);
}

function doRegister(){
  const name=(document.getElementById('reg-name')?.value||'').trim();
  const email=(document.getElementById('reg-email')?.value||'').trim();
  const pass=document.getElementById('reg-pass')?.value||'';
  const phone=(document.getElementById('reg-phone')?.value||'').trim();
  const role=regData.role||'family';
  if(!name){setErr('reg-err','Escribe tu nombre completo');return}
  if(!email||!email.includes('@')){setErr('reg-err','Ingresa un correo válido');return}
  if(pass.length<6){setErr('reg-err','La contraseña debe tener al menos 6 caracteres');return}
  if(getUserByEmail(email)){setErr('reg-err','Ya existe una cuenta con ese correo. Inicia sesión.');return}

  const userId='u-'+Date.now();
  const profileId=`${role}-${Date.now()}`;
  const profile={id:profileId,name,email,phone,role,linkedStudents:[]};

  if(role==='family'){
    const fn=(document.getElementById('reg-fn')?.value||'').trim();
    const pn=(document.getElementById('reg-pn')?.value||'').trim();
    const dob=document.getElementById('reg-dob')?.value||'';
    const cat=document.getElementById('reg-cat')?.value||'kids';
    const sched=document.getElementById('reg-sched')?.value||CATS.kids.schedules[0];
    if(fn&&pn&&dob){
      const sid=`${fn[0]}${pn[0]}-${dob.replaceAll('-','')}`.toUpperCase();
      const pe=new Date(); pe.setMonth(pe.getMonth()+2);
      // find a teacher with this cat
      const t=ST.data.teachers.find(t=>t.cats?.includes(cat));
      const student={id:sid,firstName:fn,paternal:pn,maternal:(document.getElementById('reg-mn')?.value||'').trim(),dob,gender:'Pendiente',cat,teacherId:t?.id||null,schedule:sched,enrolledAt:todayIso(),periodEnd:toIso(pe),photo:'',medical:'Pendiente',imageConsent:regData.imageConsent||false,progress:{technique:50,tactics:50,physical:50,attitude:70},attendance:[],payments:[],notes:[],media:[],parents:[{name,phone,email,relationship:'Tutor'}]};
      ST.data.students.push(student);
      profile.linkedStudents=[sid];
    }
  }
  if(role==='teacher'){
    const spec=(document.getElementById('reg-spec')?.value||'').trim()||'Profesor de academia';
    const teacherId='t-'+userId;
    ST.data.teachers.push({id:teacherId,name,phone,email,specialty:spec,cats:['kids']});
    profile.teacherId=teacherId; profile.specialty=spec;
  }

  ST.data.profiles[role]=ST.data.profiles[role]||[];
  ST.data.profiles[role].push(profile);
  ST.data.activeProfileIds[role]=profileId;

  const users=loadUsers();
  users.push({id:userId,name,email,password:btoa(pass),role,profileId,createdAt:todayIso()});
  saveUsers(users); save();
  loginAs({id:userId,name,email,role,profileId});
}

function getPendingCount(){
  return ST.data.students.flatMap(s=>s.payments||[]).filter(p=>p.status==='Comprobante en revisión').length;
}
function getMonthLabel(){
  return new Intl.DateTimeFormat('es-MX',{month:'long',year:'numeric'}).format(new Date()).replace(/^\w/,c=>c.toUpperCase());
}

function uploadReceipt(sid){
  const s=getStudent(sid);
  if(!s)return;
  const pending=(s.payments||[]).find(p=>p.status!=='Pagado');
  if(!pending){toast('No hay pagos pendientes.');return}
  // Open modal to attach image
  openModal('Subir comprobante — '+fullName(s),`
    <p class="muted text-sm mb-12">Adjunta la foto o captura de tu comprobante de pago para <strong>${h(pending.month)}</strong> por <strong>${formatMoney(pending.amount)}</strong>.</p>

      <label class="form-label">Comprobante de pago</label>
      <div id="rec-preview" style="height:100px;background:var(--gray-100);border-radius:var(--radius);display:grid;place-items:center;color:var(--gray-500);font-size:.85rem;margin-bottom:8px">Sin imagen adjunta</div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 14px;border:1.5px dashed var(--gray-300);border-radius:var(--radius);background:var(--gray-100);font-size:.85rem;color:var(--gray-700)">

      <input class="form-input" id="rec-note" placeholder="Ej. Transferencia BBVA, folio 123456"></div>
    <button class="btn btn-primary btn-full mt-8" onclick="saveReceipt('${sid}','${pending.month}')">Enviar comprobante</button>
  `);
}

function saveReceipt(sid, month){
  const s=getStudent(sid);
  const p=(s.payments||[]).find(pay=>pay.month===month);
  if(!p)return;
  const img=document.getElementById('rec-img-data')?.value||'';
  const note=document.getElementById('rec-note')?.value.trim()||'';
  p.status='Comprobante en revisión';
  p.receipt=img;
  p.receiptNote=note;
  p.submittedAt=todayIso();
  save();closeModal();renderViewOnly();toast('Comprobante enviado. Admin lo revisará pronto ✓');
}

function confirmPayment(sid, month){
  const s=getStudent(sid);
  const p=(s.payments||[]).find(pay=>pay.month===month);
  if(!p)return;
  p.status='Pagado';
  p.paidAt=todayIso();
  save();renderViewOnly();toast('Pago validado ✓');
}

function rejectPayment(sid, month){
  const s=getStudent(sid);
  const p=(s.payments||[]).find(pay=>pay.month===month);
  if(!p)return;
  p.status='Comprobante rechazado';
  p.receipt='';
  save();renderViewOnly();toast('Comprobante rechazado — familia notificada');
}

function openAddPaymentModal(sid){
  const s=getStudent(sid);
  if(!s)return;
  const pe=new Date(); pe.setMonth(pe.getMonth()+2);
  openModal('Agregar cobro — '+fullName(s),`
    <p class="muted text-sm mb-12">Genera un nuevo período de cobro para este alumno.</p>
    <div class="form-grid-2">
      <div class="form-group"><label class="form-label">Período / mes</label>
        <input class="form-input" id="ap-month" placeholder="Ej. Junio 2026" value="${getMonthLabel()}"></div>
      <div class="form-group"><label class="form-label">Monto (MXN)</label>
        <input class="form-input" id="ap-amount" type="number" placeholder="0" value="${(s.payments||[]).slice(-1)[0]?.amount||''}"></div>
      <div class="form-group"><label class="form-label">Fecha de vencimiento</label>
        <input class="form-input" id="ap-due" type="date" value="${toIso(pe)}"></div>
      <div class="form-group"><label class="form-label">Nota (opcional)</label>
        <input class="form-input" id="ap-note" placeholder="Ej. Bimestre mayo-junio"></div>
    </div>
    <button class="btn btn-primary btn-full mt-8" onclick="saveAddPayment('${sid}')">Crear cobro</button>
  `);

function saveAddPayment(sid){
  const s=getStudent(sid);
  const month=document.getElementById('ap-month')?.value.trim();
  const amount=Number(document.getElementById('ap-amount')?.value)||0;
  const due=document.getElementById('ap-due')?.value;
  const note=document.getElementById('ap-note')?.value.trim();
  if(!month||!amount||!due){toast('Completa período, monto y vencimiento');return}
  s.payments=s.payments||[];
  s.payments.push({month,amount,due,status:'Pendiente',paidAt:'',note:note||'',receipt:'',createdAt:todayIso()});
  save();closeModal();renderViewOnly();toast('Cobro registrado ✓');
}

function renderPagos(){

  if(filterStatus!=='all') filtered=filtered.filter(p=>p.status===filterStatus);
  if(filterSearch) filtered=filtered.filter(p=>[p.studentName,p.month,p.status].join(' ').toLowerCase().includes(filterSearch));
  filtered=filtered.sort((a,b)=>a.status==='Comprobante en revisión'?-1:b.status==='Comprobante en revisión'?1:0);

  const total=allPay.reduce((s,p)=>s+p.amount,0);
  const pagado=allPay.filter(p=>p.status==='Pagado').reduce((s,p)=>s+p.amount,0);

    ${kpi(formatMoney(pendiente),'Por cobrar','red')}

    ${kpi(all.length,'Alumnos activos','')}

  <div class="card mb-16">
    <div class="card-header">
      <span class="card-title">Acciones rápidas</span>

  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Historial de pagos</span>
      <span class="tag tag-gray">${filtered.length} registros</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <div style="position:relative;flex:1;min-width:180px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-500)">🔍</span>
        <input class="form-input" style="padding-left:32px" placeholder="Buscar alumno o mes…"
          value="${h(ST._paySearch||'')}" oninput="ST._paySearch=this.value;renderViewOnly()">
      </div>
      <select class="form-select" style="width:auto" onchange="ST._payFilter=this.value;renderViewOnly()">
        ${statusOpts.map(([v,l])=>`<option value="${v}" ${filterStatus===v?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    ${filtered.length?`
    <div style="display:grid;gap:8px">
      ${filtered.map(p=>{
        const s=getStudent(p.studentId);
        const isRevision=p.status==='Comprobante en revisión';
        const isPaid=p.status==='Pagado';
        const isRejected=p.status==='Comprobante rechazado';
        return`<div style="border:1.5px solid ${isRevision?'var(--lime)':isPaid?'var(--gray-200)':'var(--gray-200)'};border-radius:var(--radius-lg);padding:14px;background:${isRevision?'var(--hp-light)':isPaid?'var(--white)':'var(--white)'}">
          <div style="display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center">
            <div class="avatar ${avatarColor(p.cat)}" style="width:38px;height:38px;font-size:.8rem">${s?initials(s):'?'}</div>
            <div>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span class="fw-700">${h(p.studentName)}</span>
                ${catTag(p.cat)}

              </div>
              <div class="muted text-sm">${h(p.month)} · ${formatMoney(p.amount)} · Vence ${formatDate(p.due)}</div>
              ${p.note?`<div class="muted text-sm">${h(p.note)}</div>`:''}
              ${isPaid?`<div class="muted text-sm">Pagado el ${formatDate(p.paidAt)}</div>`:''}
              ${p.receiptNote?`<div class="muted text-sm">Ref: ${h(p.receiptNote)}</div>`:''}

    </div>`:emptyState('💳','Sin registros de pago','Los cobros aparecerán aquí cuando agregues alumnos con monto de pago.','','')}
  </div>`;
}

      <div style="max-height:200px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:var(--radius);padding:8px;display:grid;gap:6px">
        <label style="display:flex;gap:8px;align-items:center;cursor:pointer;padding:4px;background:var(--kids-light);border-radius:6px">
          <input type="checkbox" id="gb-all" style="accent-color:var(--blue)" onchange="toggleAllStudents(this.checked)">
          <strong>Seleccionar todos</strong>
        </label>
        ${students.map(s=>`
          <label style="display:flex;gap:8px;align-items:center;cursor:pointer;padding:4px">
            <input type="checkbox" class="gb-st" value="${s.id}" style="accent-color:var(--blue)">
            ${h(fullName(s))} ${catTag(s.cat)} <span class="muted text-sm">${formatMoney((s.payments||[]).slice(-1)[0]?.amount||0)}</span>

function toggleAllStudents(checked){
  document.querySelectorAll('.gb-st').forEach(cb=>cb.checked=checked);
}

function saveGenerateBilling(){
  const month=document.getElementById('gb-month')?.value.trim();
  const due=document.getElementById('gb-due')?.value;
  if(!month||!due){toast('Completa período y vencimiento');return}
  const selected=[...document.querySelectorAll('.gb-st:checked')].map(el=>el.value);
  if(!selected.length){toast('Selecciona al menos un alumno');return}
  let count=0;
  selected.forEach(sid=>{
    const s=getStudent(sid);
    if(!s)return;
    const already=(s.payments||[]).find(p=>p.month===month);
    if(already){return}
    const lastAmt=(s.payments||[]).slice(-1)[0]?.amount||0;
    s.payments=s.payments||[];
    s.payments.push({month,amount:lastAmt,due,status:'Pendiente',paidAt:'',receipt:'',createdAt:todayIso()});
    count++;
  });
  save();closeModal();ST.view='pagos';render();toast(`${count} cobros generados ✓`);
}

function exportPayments(){
  const all=ST.data.students;
  const rows=[['Alumno','Categoría','Período','Monto','Vencimiento','Estado','Fecha pago']];
  all.forEach(s=>{
    (s.payments||[]).forEach(p=>{
      rows.push([fullName(s),CATS[s.cat]?.label||s.cat,p.month,p.amount,p.due,p.status,p.paidAt||'']);
    });
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='contrapared-pagos.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Exportado como CSV ✓');
}

function updateSmCat(cat){
  const ts=document.getElementById('sm-sched');
  const tt=document.getElementById('sm-teacher');
  if(ts)ts.innerHTML=(CATS[cat]?.schedules||[]).map(v=>`<option>${v}</option>`).join('');

    const teachers=ST.data.teachers.filter(t=>(t.cats||[]).includes(cat));
    tt.innerHTML=`<option value="">Sin asignar</option>${teachers.map(t=>`<option value="${t.id}">${h(t.name)}</option>`).join('')}${!teachers.length?'<option disabled>No hay profesores para esta categoría</option>':''}`;
  }
}
function updateSmSched(cat){updateSmCat(cat)}
function saveStudentModal(id){
  const fn=document.getElementById('sm-fn').value.trim();
  const pn=document.getElementById('sm-pn').value.trim();
  const dob=document.getElementById('sm-dob').value;
  const cat=document.getElementById('sm-cat').value;
  const sched=document.getElementById('sm-sched').value;
  const parentName=document.getElementById('sm-parent').value.trim();
  const phone=document.getElementById('sm-phone').value.trim();
  const med=document.getElementById('sm-med').value.trim();
  const teacherId=document.getElementById('sm-teacher').value;
  const amount=Number(document.getElementById('sm-amount').value)||0;
  if(!fn||!pn||!dob){toast('Completa nombre y fecha de nacimiento');return}
  const pe=new Date();pe.setMonth(pe.getMonth()+2);
  if(id){
    const s=getStudent(id);
    Object.assign(s,{firstName:fn,paternal:pn,maternal:document.getElementById('sm-mn').value.trim(),dob,cat,teacherId:teacherId||null,schedule:sched,medical:med,parents:[{name:parentName,phone,email:s.parents?.[0]?.email||'',relationship:s.parents?.[0]?.relationship||'Tutor'}]});
    if(amount&&(!s.payments?.length))s.payments=[{month:new Intl.DateTimeFormat('es-MX',{month:'long',year:'numeric'}).format(new Date()),amount,due:toIso(pe),status:'Pendiente',paidAt:''}];
  }else{
    const sid=`${fn[0]}${pn[0]}-${dob.replaceAll('-','')}`.toUpperCase();
    const newS={id:sid,firstName:fn,paternal:pn,maternal:document.getElementById('sm-mn').value.trim(),dob,gender:'Pendiente',cat,teacherId:teacherId||null,schedule:sched,enrolledAt:todayIso(),periodEnd:toIso(pe),photo:'',medical:med,imageConsent:false,progress:{technique:50,tactics:50,physical:50,attitude:70},attendance:[],payments:amount?[{month:new Intl.DateTimeFormat('es-MX',{month:'long',year:'numeric'}).format(new Date()),amount,due:toIso(pe),status:'Pendiente',paidAt:''}]:[],notes:[],media:[],parents:[{name:parentName,phone,email:'',relationship:'Tutor'}]};
    ST.data.students.push(newS);
  }
  save();closeModal();ST.view='students';render();toast(id?'Alumno actualizado ✓':'Alumno creado ✓');
}

// ─── CALENDAR ────────────────────────────────────────────────────────────────
function renderCalendar(){
  const lessons=getVisibleLessons();
  const sel=lessons.filter(l=>l.date===ST.selectedDate);
  const lMap=lessons.reduce((m,l)=>{m[l.date]=m[l.date]||[];m[l.date].push(l);return m},{});
  const days=buildCalDays(ST.calendarMonth);
  const today=todayIso();
  const grid=days.map(d=>{const iso=toIso(d);const inM=iso.startsWith(ST.calendarMonth);const dl=lMap[iso]||[];const isT=iso===today;const isSel=iso===ST.selectedDate;return`<button class="cal-day ${isSel?'sel':''} ${isT?'today':''} ${!inM?'muted':''}" onclick="selDate('${iso}')"><span class="cal-day-num">${d.getDate()}</span>${dl.slice(0,2).map(l=>`<span class="cal-event cal-event-${l.cat}">${h(l.time?.split('-')[0]||'')} ${h(CATS[l.cat]?.label?.split(' ')[0]||l.cat)}</span>`).join('')}${dl.length>2?`<span style="font-size:.6rem;color:var(--gray-500)">+${dl.length-2}</span>`:''}</button>`}).join('');
  return`<div class="section-title">Calendario de clases</div>
  <div class="section-sub">Selecciona un día para ver el detalle</div>
  <div class="cal-layout">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span class="fw-700">${formatMonth(ST.calendarMonth)}</span>
        <div style="display:flex;gap:6px">${can('createLesson')?`<button class="btn btn-primary btn-sm" onclick="openLessonModal()">+ Clase</button>`:''}<button class="btn btn-ghost btn-sm" onclick="shiftMonth(-1)">←</button><button class="btn btn-ghost btn-sm" onclick="shiftMonth(1)">→</button></div>
      </div>
      <div class="cal-grid">${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div class="cal-weekday">${d}</div>`).join('')}${grid}</div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">${formatShort(ST.selectedDate)}</span><span class="tag tag-blue">${sel.length} clases</span></div>
      ${sel.length?sel.map(l=>`<div style="display:grid;grid-template-columns:70px 1fr;gap:10px;align-items:center;padding:10px;background:var(--gray-100);border-radius:var(--radius);margin-bottom:8px"><div style="background:var(--blue);color:white;border-radius:var(--radius);padding:8px;text-align:center;font-size:.8rem;font-weight:800">${h(l.time)}</div><div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:3px">${catTag(l.cat)}<span class="tag tag-gray">Cancha ${h(l.court)}</span></div><div class="fw-700 text-sm">${h(l.focus)}</div><div class="muted text-sm">${h(getTeacher(l.teacherId).name)}</div><div class="muted text-sm">Alumnos: ${(l.students||[]).map(id=>getStudent(id)?fullName(getStudent(id)):'?').join(', ')||'Sin alumnos'}</div><div style="display:flex;gap:6px;margin-top:8px">${can('takeAttendance')?`<button class="btn btn-lime btn-sm" onclick="openAttendance('${l.id}')">✓ Asistencia</button>`:''}${can('createLesson')||can('takeAttendance')?`<button class="btn btn-ghost btn-sm" onclick="openLessonModal('${l.id}')">✏️ Editar clase</button>`:''}</div></div></div>`).join(''):emptyState('📅','Sin clases este día','',can('createLesson')?'+ Agregar clase':'',can('createLesson')?'openLessonModal()':'')}
    </div>
  </div>`;
}
function selDate(iso){ST.selectedDate=iso;ST.calendarMonth=iso.slice(0,7);renderViewOnly()}
function shiftMonth(dir){const c=new Date(ST.calendarMonth+'-01T00:00:00');c.setMonth(c.getMonth()+dir);ST.calendarMonth=toIso(c).slice(0,7);renderViewOnly()}
function buildCalDays(month){const f=new Date(month+'-01T00:00:00');const s=new Date(f);const mi=(f.getDay()+6)%7;s.setDate(f.getDate()-mi);return Array.from({length:42},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d})}

// ─── ATTENDANCE ──────────────────────────────────────────────────────────────
function openAttendance(lessonId){

function setAtt(lid,sid,status){const l=ST.data.lessons.find(x=>x.id===lid);const s=getStudent(sid);if(!s||!l)return;s.attendance=s.attendance||[];let r=s.attendance.find(a=>a.date===l.date);if(r)r.status=status;else s.attendance.push({date:l.date,status});save();document.getElementById(`ao-${sid}`)?.classList.toggle('check',status==='ok');document.getElementById(`an-${sid}`)?.classList.toggle('cross',status==='no')}

// ─── LESSON MODAL ────────────────────────────────────────────────────────────

        <select class="form-select" id="lm-teacher" onchange="updateLessonStudents()">

          ${ST.data.teachers.filter(t=>(t.cats||[]).includes(initCat)).map(t=>`<option value="${t.id}" ${initTeacher===t.id?'selected':''}>${h(t.name)}</option>`).join('')}
          ${!ST.data.teachers.filter(t=>(t.cats||[]).includes(initCat)).length?`<option disabled>No hay profesores para ${CATS[initCat].label}</option>`:''}
        </select></div>

        <select class="form-select" id="lm-court">${CATS[initCat].courts.map(c=>`<option ${l?.court===c?'selected':''}>Cancha ${c}</option>`).join('')}</select></div>

        <label class="form-label" style="margin:0" id="lm-stlabel">Alumnos (máx. ${CATS[initCat].maxPerClass})</label>

function updateLessonForm(){
  const cat=document.getElementById('lm-cat')?.value||'kids';
  const cd=CATS[cat];
  const te=document.getElementById('lm-time');
  const ce=document.getElementById('lm-court');
  const tt=document.getElementById('lm-teacher');
  const sl=document.getElementById('lm-stlabel');
  if(te)te.innerHTML=cd.schedules.map(s=>`<option>${s}</option>`).join('');
  if(ce)ce.innerHTML=cd.courts.map(c=>`<option>Cancha ${c}</option>`).join('');
  if(tt){
    const teachers=ST.data.teachers.filter(t=>(t.cats||[]).includes(cat));
    tt.innerHTML=`<option value="">Sin asignar</option>${teachers.map(t=>`<option value="${t.id}">${h(t.name)}</option>`).join('')}${!teachers.length?`<option disabled>No hay profesores para ${cd.label}</option>`:''}`;
  }
  if(sl)sl.textContent=`Alumnos (máx. ${cd.maxPerClass})`;
  updateLessonStudents();
}
function updateLessonStudents(){
  const cat=document.getElementById('lm-cat')?.value||'kids';
  const teacherId=document.getElementById('lm-teacher')?.value||'';
  const sd=document.getElementById('lm-students');
  if(!sd)return;
  const cats=ST.data.students.filter(s=>s.cat===cat);
  const list=teacherId?cats.filter(s=>s.teacherId===teacherId):cats;
  sd.innerHTML=list.length?list.map(s=>`<label style="display:flex;gap:8px;align-items:center;cursor:pointer;padding:6px 8px;border-radius:6px"><input type="checkbox" value="${s.id}" style="accent-color:var(--blue)">${h(fullName(s))} ${catTag(s.cat)}<span class="muted text-sm">${h(s.schedule)}</span></label>`).join(''):`<span class="muted text-sm">No hay alumnos${teacherId?' asignados a este profesor':' en esta categoría'}.</span>`;
}
function saveLesson(lessonId=''){
  const cat=document.getElementById('lm-cat').value;
  const date=document.getElementById('lm-date').value;
  const time=document.getElementById('lm-time').value;
  const teacherId=document.getElementById('lm-teacher').value;
  const court=document.getElementById('lm-court').value.replace('Cancha ','');
  const focus=document.getElementById('lm-focus').value.trim()||'Clase general';
  const max=CATS[cat].maxPerClass;
  const students=[...document.querySelectorAll('#lm-students input:checked')].map(el=>el.value).slice(0,max);
  if(!date){toast('Selecciona fecha');return}
  if(lessonId){
    const l=ST.data.lessons.find(x=>x.id===lessonId);
    if(l)Object.assign(l,{date,time,cat,teacherId:teacherId||null,court,focus,students});
    toast('Clase actualizada ✓');
  }else{
    ST.data.lessons.push({id:'l-'+Date.now(),date,time,cat,teacherId:teacherId||null,court,focus,students});
    toast('Clase creada ✓');
  }
  save();closeModal();ST.selectedDate=date;ST.calendarMonth=date.slice(0,7);ST.view='calendar';render();
}

// ─── MESSAGES ────────────────────────────────────────────────────────────────
function renderMessages(){
  const convs=getVisibleConversations();
  if(!ST.selectedConversationId||!convs.find(c=>c.id===ST.selectedConversationId))ST.selectedConversationId=convs[0]?.id||null;
  const sel=convs.find(c=>c.id===ST.selectedConversationId);
  if(sel?.unread)sel.unread[ST.role]=0;
  const canReply=sel?.allowReplies!==false;
  return`<div class="section-title">Mensajes</div>
  <div class="section-sub">Comunicación entre roles</div>
  ${can('manageConversation')?`<div class="mb-12"><button class="btn btn-primary btn-sm" onclick="openNewConvModal()">+ Iniciar conversación</button></div>`:''}
  <div class="chat-layout">
    <div class="conv-list">
      ${convs.length?convs.map(c=>`<div class="conv-card ${c.id===ST.selectedConversationId?'active':''}" onclick="selConv('${c.id}')"><div class="conv-title">${h(c.title)}</div><div class="conv-sub">${h(c.scope)}</div>${c.unread?.[ST.role]?`<span class="tag tag-blue mt-8">${c.unread[ST.role]} sin leer</span>`:''}</div>`).join(''):emptyState('💬','Sin conversaciones','Aquí aparecerán tus chats.','','')  }
    </div>
    ${sel?`<div class="chat-panel"><div class="chat-head"><div class="chat-head-title">${h(sel.title)}</div><div class="chat-head-sub">${h(sel.scope)}</div></div>
      <div class="chat-messages" id="chat-msgs">${(sel.messages||[]).length?(sel.messages||[]).map(m=>`<div><div class="bubble ${m.role===ST.role?'bubble-mine':'bubble-theirs'}">${h(m.body)}</div><div class="bubble-time" style="text-align:${m.role===ST.role?'right':'left'}">${h(m.author)} · ${h(m.time)}</div></div>`).join(''):emptyState('💬','Sin mensajes aún','Escribe el primero.','','')}</div>
      ${canReply?`<div class="chat-compose"><input id="msg-in" placeholder="Escribe un mensaje…" onkeydown="if(event.key==='Enter')sendMsg()"><button class="btn btn-primary" onclick="sendMsg()">Enviar</button></div>`:`<div style="padding:12px;color:var(--gray-500);font-size:.85rem;border-top:1px solid var(--gray-200)">Canal de solo lectura.</div>`}
    </div>`:emptyState('💬','Selecciona una conversación','',  '','')  }
  </div>`;
}
function selConv(id){ST.selectedConversationId=id;renderViewOnly()}
function sendMsg(){const inp=document.getElementById('msg-in');const body=inp?.value?.trim();if(!body)return;const conv=ST.data.conversations.find(c=>c.id===ST.selectedConversationId);if(!conv)return;const now=new Date();const time=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;conv.messages.push({author:getActiveProfile()?.name||ST.role,role:ST.role,body,time});Object.keys(conv.unread||{}).forEach(r=>{if(r!==ST.role)conv.unread[r]=(conv.unread[r]||0)+1});inp.value='';save();renderViewOnly();setTimeout(()=>{const cm=document.getElementById('chat-msgs');if(cm)cm.scrollTop=cm.scrollHeight},50)}
function openNewConvModal(){
  const families=ST.data.profiles.family||[];
  openModal('Nueva conversación',`
    <div class="form-group"><label class="form-label">Dirigido a</label>
      <select class="form-select" id="nc-role"><option value="family">Familia</option><option value="teacher">Profesor</option><option value="all">Todos</option></select></div>
    ${families.length?`<div class="form-group"><label class="form-label">Familia específica (opcional)</label><select class="form-select" id="nc-fam"><option value="">Todas las familias</option>${families.map(f=>`<option value="${f.id}">${h(f.name)}</option>`).join('')}</select></div>`:''}
    <div class="form-group"><label class="form-label">Asunto</label><input class="form-input" id="nc-title" placeholder="Ej. Revisión de pago mayo"></div>
    <div class="form-group"><label class="form-label">Primer mensaje</label><textarea class="form-textarea" id="nc-msg" placeholder="Escribe el mensaje inicial…"></textarea></div>
    <button class="btn btn-primary btn-full mt-8" onclick="saveNewConv()">Iniciar conversación</button>
  `);
}
function saveNewConv(){
  const toRole=document.getElementById('nc-role')?.value||'family';
  const title=document.getElementById('nc-title')?.value.trim();
  const msg=document.getElementById('nc-msg')?.value.trim();
  if(!title||!msg){toast('Completa asunto y mensaje');return}
  const famId=document.getElementById('nc-fam')?.value;
  const fam=ST.data.profiles.family?.find(f=>f.id===famId);
  const now=new Date();const time=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const roles=toRole==='all'?['family','teacher','admin','director']:[toRole,'admin','director'];
  const conv={id:'c-'+Date.now(),title,scope:fam?.name||{family:'Familias',teacher:'Profesores',all:'Todos'}[toRole]||toRole,roles,familyId:famId||null,allowReplies:true,unread:Object.fromEntries(roles.map(r=>[r,r===ST.role?0:1])),messages:[{author:getActiveProfile()?.name||'Administración',role:ST.role,body:msg,time}]};
  ST.data.conversations.unshift(conv);ST.selectedConversationId=conv.id;
  save();closeModal();renderViewOnly();toast('Conversación iniciada ✓');
}

function renderTeacher(){
  const profile=getActiveProfile('teacher');
  const myTeacherId=profile?.teacherId||null;
  const myLessons=ST.data.lessons.filter(l=>l.teacherId===myTeacherId);
  const upcomingLessons=myLessons.filter(l=>l.date>=todayIso()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  const myStudents=ST.data.students.filter(s=>s.teacherId===myTeacherId);
  const birthdays=getNearBirthdays().filter(s=>s.teacherId===myTeacherId);
  const lessonCards=upcomingLessons.map(l=>{
    const enrolled=(l.students||[]).map(id=>getStudent(id)).filter(Boolean);
    const available=myStudents.filter(s=>s.cat===l.cat&&!(l.students||[]).includes(s.id));
    const max=CATS[l.cat]?.maxPerClass||6;
    const chips=enrolled.length?enrolled.map(s=>`<div style="display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--kids-light);border-radius:20px;font-size:.78rem;font-weight:700">${h(s.firstName)}<button onclick="removeFromLesson('${l.id}','${s.id}')" style="background:none;cursor:pointer;font-size:14px;color:var(--gray-500);margin-left:2px">✕</button></div>`).join(''):`<span class="muted text-sm">Sin alumnos asignados</span>`;
    const addRow=(enrolled.length<max&&available.length)?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px"><select id="add-st-${l.id}" class="form-select" style="width:auto;font-size:.82rem"><option value="">Agregar alumno…</option>${available.map(s=>`<option value="${s.id}">${h(fullName(s))} (${h(s.schedule)})</option>`).join('')}</select><button class="btn btn-ghost btn-sm" onclick="addToLesson('${l.id}')">+ Agregar</button></div>`:enrolled.length>=max?`<div class="muted text-sm mt-8">Clase completa (${max}/${max})</div>`:`<div class="muted text-sm mt-8">No hay más alumnos disponibles de ${CATS[l.cat]?.label}</div>`;
    return`<div style="border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap"><div style="background:var(--blue);color:white;border-radius:var(--radius);padding:8px 12px;text-align:center;font-size:.82rem;font-weight:800;white-space:nowrap">${h(l.time)}<br><span style="font-size:.62rem;opacity:.8">${formatShort(l.date)}</span></div><div style="flex:1">${catTag(l.cat)}<div class="fw-700 text-sm mt-8">${h(l.focus)}</div><div class="muted text-sm">Cancha ${h(l.court)} · ${enrolled.length}/${max} alumnos</div></div><button class="btn btn-lime btn-sm" onclick="openAttendance('${l.id}')">✓ Asistencia</button></div><div style="display:flex;flex-wrap:wrap;gap:6px">${chips}</div>${addRow}</div>`;
  }).join('');
  const studentCards=myStudents.map(s=>{
    const cl=ST.data.lessons.find(l=>(l.students||[]).includes(s.id)&&l.date>=todayIso());
    return`<div style="padding:14px;background:var(--gray-100);border-radius:var(--radius)"><div class="fw-700 text-sm mb-8">${h(fullName(s))} ${catTag(s.cat)}</div><div class="muted text-sm mb-8">Horario: ${h(s.schedule)}</div><div class="progress-row mb-8"><span style="font-size:.78rem">Progreso</span><div class="progress-bar"><div class="progress-fill" style="width:${avgProgress(s)}%"></div></div><span style="font-size:.78rem">${avgProgress(s)}%</span></div>${cl?`<div class="muted text-sm mb-8">Próx. clase: ${formatShort(cl.date)} ${h(cl.time)}</div>`:''}<div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-ghost btn-sm" onclick="openStudent('${s.id}')">Ver perfil</button><button class="btn btn-primary btn-sm" onclick="openProgressModal('${s.id}')">Avance</button><button class="btn btn-ghost btn-sm" onclick="openChangeScheduleModal('${s.id}')">Cambiar horario</button></div></div>`;
  }).join('');
  return`<div class="section-title">Mi grupo</div>
  <div class="grid-3 mb-16">${kpi(myStudents.length,'Mis alumnos','')}${kpi(upcomingLessons.length,'Clases próximas','lime')}${kpi(birthdays.length,'Cumpleaños próximos',birthdays.length?'lime':'')}</div>
  <div class="card mb-16"><div class="card-header"><span class="card-title">Mis clases próximas</span></div>${upcomingLessons.length?lessonCards:emptyState('📅','Sin clases próximas','Administración te asignará clases próximamente.','','')}</div>
  <div class="card"><div class="card-header"><span class="card-title">Mis alumnos</span><span class="tag tag-blue">${myStudents.length}</span></div>${myStudents.length?`<div class="grid-2">${studentCards}</div>`:emptyState('👥','Sin alumnos asignados','Pide a administración que te asigne alumnos.','','')}</div>`;
}

function addToLesson(lessonId){
  const sel=document.getElementById('add-st-'+lessonId);const sid=sel?.value;
  if(!sid){toast('Selecciona un alumno');return}
  const l=ST.data.lessons.find(x=>x.id===lessonId);
  const max=CATS[l.cat]?.maxPerClass||6;
  if((l.students||[]).length>=max){toast(`La clase está llena (máx. ${max})`);return}
  l.students=l.students||[];if(!l.students.includes(sid))l.students.push(sid);
  save();renderViewOnly();toast('Alumno agregado a la clase ✓');
}
function removeFromLesson(lessonId,sid){
  const l=ST.data.lessons.find(x=>x.id===lessonId);if(!l)return;
  l.students=(l.students||[]).filter(id=>id!==sid);
  save();renderViewOnly();toast('Alumno removido de la clase');
}
function openChangeScheduleModal(sid){
  const s=getStudent(sid);if(!s)return;
  openModal('Cambiar horario — '+fullName(s),`
    <p class="muted text-sm mb-12">Selecciona el nuevo horario para ${h(s.firstName)}.</p>
    <div class="form-group"><label class="form-label">Horario actual</label><div style="padding:10px;background:var(--gray-100);border-radius:var(--radius);font-weight:700">${h(s.schedule)}</div></div>
    <div class="form-group"><label class="form-label">Nuevo horario</label>
      <select class="form-select" id="ch-sched">${CATS[s.cat].schedules.map(sc=>`<option ${s.schedule===sc?'selected':''}>${sc}</option>`).join('')}</select></div>
    <button class="btn btn-primary btn-full mt-8" onclick="saveChangeSchedule('${sid}')">Guardar cambio</button>
  `);
}
function saveChangeSchedule(sid){
  const s=getStudent(sid);if(!s)return;
  const newSched=document.getElementById('ch-sched')?.value;if(!newSched){closeModal();return}
  const old=s.schedule;s.schedule=newSched;
  ST.data.lessons.forEach(l=>{if((l.students||[]).includes(sid)&&l.time===old)l.students=l.students.filter(id=>id!==sid)});
  save();closeModal();renderViewOnly();toast(`Horario de ${s.firstName} actualizado a ${newSched} ✓`);
}

function newSurvey(){closeModal();openModal('Nueva encuesta',`<div class="form-group"><label class="form-label">Título</label><input class="form-input" id="nsv-t" placeholder="Ej. Satisfacción junio 2026"></div><div id="nsv-qs" style="display:grid;gap:10px;margin-bottom:12px"></div><button class="btn btn-ghost btn-sm btn-full mb-12" onclick="addSQ()">+ Agregar pregunta</button><button class="btn btn-primary btn-full" onclick="saveSurvey()">Crear encuesta</button>`);addSQ()}
function addSQ(cont='nsv-qs'){const c=document.getElementById(cont);if(!c)return;const n=c.children.length+1;const d=document.createElement('div');d.className='nsv-q';d.style.cssText='display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;margin-bottom:0';d.innerHTML=`<input class="form-input" placeholder="Pregunta ${n}"><select class="form-select" style="width:auto"><option value="nps">NPS</option><option value="stars">Estrellas</option><option value="text">Texto</option></select><button onclick="this.parentElement.remove()" style="background:none;cursor:pointer;font-size:18px;color:var(--gray-500)">✕</button>`;c.appendChild(d)}
function saveSurvey(){const title=document.getElementById('nsv-t')?.value.trim();if(!title){toast('Escribe un título');return}const qs=[...document.querySelectorAll('.nsv-q')].map((el,i)=>({id:'q'+(i+1),type:el.querySelector('select').value,text:el.querySelector('input').value.trim()})).filter(q=>q.text);if(!qs.length){toast('Agrega al menos una pregunta');return}ST.data.surveys=ST.data.surveys||[];ST.data.surveys.push({id:'sv-'+Date.now(),title,active:true,questions:qs,responses:[]});save();closeModal();toast('Encuesta creada ✓')}
function editSurvey(id){const sv=(ST.data.surveys||[]).find(s=>s.id===id);if(!sv)return;closeModal();openModal('Editar: '+sv.title,`<div class="form-group"><label class="form-label">Título</label><input class="form-input" id="esv-t" value="${h(sv.title)}"></div><div id="esv-qs" style="display:grid;gap:10px;margin-bottom:12px">${(sv.questions||[]).map(q=>`<div class="nsv-q" style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center"><input class="form-input" value="${h(q.text)}"><select class="form-select" style="width:auto">${['nps','stars','text'].map(t=>`<option value="${t}" ${q.type===t?'selected':''}>${t==='nps'?'NPS':t==='stars'?'Estrellas':'Texto'}</option>`).join('')}</select><button onclick="this.parentElement.remove()" style="background:none;cursor:pointer;font-size:18px;color:var(--gray-500)">✕</button></div>`).join('')}</div><button class="btn btn-ghost btn-sm btn-full mb-12" onclick="addSQ('esv-qs')">+ Pregunta</button><button class="btn btn-primary btn-full" onclick="saveEditSurvey('${id}')">Guardar</button>`)}
function saveEditSurvey(id){const sv=(ST.data.surveys||[]).find(s=>s.id===id);if(!sv)return;sv.title=document.getElementById('esv-t')?.value.trim()||sv.title;sv.questions=[...document.querySelectorAll('.nsv-q')].map((el,i)=>({id:'q'+(i+1),type:el.querySelector('select').value,text:el.querySelector('input').value.trim()})).filter(q=>q.text);save();closeModal();toast('Encuesta actualizada ✓')}
function viewResponses(id){const sv=(ST.data.surveys||[]).find(s=>s.id===id);if(!sv)return;openModal('Respuestas: '+sv.title,(sv.responses||[]).length?`<div style="display:grid;gap:10px">${sv.responses.map((r,i)=>`<div style="padding:12px;background:var(--gray-100);border-radius:var(--radius)"><div class="fw-700 text-sm mb-8">Respuesta ${i+1} — ${h(r.date)}</div>${(sv.questions||[]).map(q=>`<div class="mb-8"><div class="muted text-sm">${h(q.text)}</div><div class="fw-700 text-sm">${h(String(r.answers?.[q.id]??'–'))}</div></div>`).join('')}</div>`).join('')}</div>`:emptyState('📋','Sin respuestas aún','',  '',''))}
function openSurveyFamily(){const sv=(ST.data.surveys||[]).find(s=>s.active);if(!sv)return;openModal('📋 '+sv.title,`<div style="display:grid;gap:16px">${(sv.questions||[]).map(q=>`<div style="padding:14px;background:var(--gray-100);border-radius:var(--radius)"><div class="fw-700 text-sm mb-10">${h(q.text)}</div>${q.type==='nps'?`<div class="nps-scale">${Array.from({length:11},(_,i)=>`<button class="nps-btn" onclick="setNps('${q.id}',${i},this)">${i}</button>`).join('')}</div>`:q.type==='stars'?`<div class="star-row">${Array.from({length:5},(_,i)=>`<span class="star-btn" onclick="setStar('${q.id}',${i+1})">⭐</span>`).join('')}</div>`:`<textarea class="form-textarea" id="sv-${q.id}" placeholder="Tu respuesta…"></textarea>`}</div>`).join('')}</div><button class="btn btn-primary btn-full mt-12" onclick="submitSurvey('${sv.id}')">Enviar respuesta</button>`)}
function setNps(qid,val,btn){btn.closest('.nps-scale').querySelectorAll('.nps-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');window._sa=window._sa||{};window._sa[qid]=val}
function setStar(qid,val){window._sa=window._sa||{};window._sa[qid]=val;document.querySelectorAll('.star-btn').forEach((b,i)=>{b.classList.toggle('on',i<val)})}
function submitSurvey(id){const sv=(ST.data.surveys||[]).find(s=>s.id===id);if(!sv)return;const ans=window._sa||{};(sv.questions||[]).filter(q=>q.type==='text').forEach(q=>{const el=document.getElementById('sv-'+q.id);if(el)ans[q.id]=el.value});sv.responses=sv.responses||[];sv.responses.push({date:todayIso(),answers:ans});save();closeModal();toast('¡Gracias por tu respuesta!');window._sa={}}

// Shared image helpers
function previewImg(input, previewId, dataId){
  const file=input.files[0];
  if(!file)return;
  if(file.size>2*1024*1024){toast('La imagen debe pesar menos de 2 MB');return}
  const reader=new FileReader();
  reader.onload=e=>{
    const prev=document.getElementById(previewId);
    if(prev)prev.innerHTML=`<img src="${e.target.result}" style="width:100%;height:160px;object-fit:cover;border-radius:var(--radius);display:block">`;
    const data=document.getElementById(dataId);
    if(data)data.value=e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearImg(previewId, dataId){
  const prev=document.getElementById(previewId);
  if(prev)prev.innerHTML=`<div style="height:100px;background:var(--gray-100);border-radius:var(--radius);display:grid;place-items:center;color:var(--gray-500);font-size:.85rem">Sin imagen</div>`;
  const data=document.getElementById(dataId);
  if(data)data.value='';
}

function saveService(id){
  const title=document.getElementById('sv-title')?.value.trim();
  if(!title){toast('Escribe el nombre del beneficio');return}
  const data={
    title,
    tag:document.getElementById('sv-tag')?.value.trim(),
    icon:document.getElementById('sv-icon')?.value.trim()||'🏅',
    image:document.getElementById('sv-img-data')?.value||'',
    subtitle:document.getElementById('sv-sub')?.value.trim(),
    detail:document.getElementById('sv-detail')?.value.trim(),
    description:document.getElementById('sv-desc')?.value.trim(),
    schedule:document.getElementById('sv-schedule')?.value.trim(),
    promo:document.getElementById('sv-promo')?.value.trim(),
    contact:document.getElementById('sv-contact')?.value.trim(),
  };
  ST.data.services=ST.data.services||[];
  if(id){const s=ST.data.services.find(x=>x.id===id);if(s)Object.assign(s,data)}
  else ST.data.services.push({id:'srv-'+Date.now(),...data});
  save();closeModal();renderViewOnly();toast(id?'Beneficio actualizado ✓':'Beneficio publicado ✓');
}

function deleteService(id){
  if(!confirm('¿Eliminar este beneficio?'))return;
  ST.data.services=(ST.data.services||[]).filter(x=>x.id!==id);
  save();closeModal();renderViewOnly();toast('Beneficio eliminado');
}

// ─── EXPORT STUDENTS ─────────────────────────────────────────────────────────
function getStudentRows(){
  const students=getVisibleStudents();
  const headers=['ID','Nombre','Apellido paterno','Apellido materno','Fecha nacimiento','Edad','Género','Categoría','Profesor','Horario','Fecha inscripción','Fin de periodo','Info médica','Uso de imagen','Asistencia %','Progreso técnica','Progreso táctica','Progreso físico','Progreso actitud','Progreso promedio','Tutor','Teléfono tutor','Correo tutor','Último pago','Estado pago'];
  const rows=students.map(s=>{
    const t=getTeacher(s.teacherId);
    const pay=(s.payments||[]).slice(-1)[0];
    return[
      s.id, s.firstName, s.paternal, s.maternal||'', s.dob, getAge(s.dob),
      s.gender||'', CATS[s.cat]?.label||s.cat, t.name, s.schedule,
      s.enrolledAt||'', s.periodEnd||'',
      s.medical||'', s.imageConsent?'Sí':'No',
      attRate(s)+'%',
      s.progress?.technique||0, s.progress?.tactics||0,
      s.progress?.physical||0, s.progress?.attitude||0,
      avgProgress(s),
      s.parents?.[0]?.name||'', s.parents?.[0]?.phone||'', s.parents?.[0]?.email||'',
      pay?.month||'', pay?.status||'Sin registro',
    ];
  });
  return{headers,rows};
}

function exportStudentsCSV(){
  const {headers,rows}=getStudentRows();
  const all=[headers,...rows];
  const csv=all.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='contrapared-alumnos.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Exportado como CSV ✓');
}

function exportStudentsXLSX(){
  const {headers,rows}=getStudentRows();
  // Build XLSX manually (minimal format without external lib)
  // We'll use a styled HTML table that Excel can open
  const esc=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const catColors={kids:'#eef1fa',hp:'#f7f9d6',academia:'#f0f0f0'};
  const getColor=row=>{
    const cat=row[3]||'';
    if(cat.includes('KIDS'))return catColors.kids;
    if(cat.includes('HIGH'))return catColors.hp;
    if(cat.includes('ACADEMIA'))return catColors.academia;
    return '#ffffff';
  };
  const html=`
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><style>
  table{border-collapse:collapse;font-family:Calibri,Arial,sans-serif;font-size:11pt}
  th{background:#2B4590;color:#ffffff;padding:6px 10px;border:1px solid #1e3270;font-weight:bold;white-space:nowrap}
  td{padding:5px 10px;border:1px solid #d1d5de;white-space:nowrap;vertical-align:middle}
  .paid{color:#065f46;background:#d1fae5;font-weight:bold}
  .pending{color:#991b1b;background:#fee2e2;font-weight:bold}
  .review{color:#92400e;background:#fef3c7;font-weight:bold}
</style></head>
<body>
<h2 style="font-family:Calibri;color:#2B4590">Contrapared Connect — Listado de alumnos</h2>
<p style="font-family:Calibri;color:#666">Generado: ${new Date().toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'})}</p>
<table>
<thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
<tbody>${rows.map(r=>{
    const status=String(r[r.length-1]);
    const statusClass=status==='Pagado'?'paid':status.includes('revisión')?'review':'pending';
    const bg=getColor(r);
    return`<tr>${r.map((v,i)=>{
      if(i===r.length-1)return`<td class="${statusClass}">${esc(v)}</td>`;
      return`<td style="background:${i<4?bg:'#ffffff'}">${esc(v)}</td>`;
    }).join('')}</tr>`;
  }).join('')}</tbody>
</table>
</body></html>`;
  const blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='contrapared-alumnos.xls'; a.click();
  URL.revokeObjectURL(url);
  toast('Exportado como Excel ✓');
}
